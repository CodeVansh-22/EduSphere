<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EduSphere</title>
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css_files/style.css">
    <style>
        .admin-tabs {
            display: flex;
            gap: 10px;
            max-width: 1400px;
            margin: 100px auto 10px;
            padding: 0 20px;
        }

        .tab-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px 10px 0 0;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: var(--primary-gradient);
            border-bottom: none;
        }

        .admin-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto 50px;
            padding: 0 20px;
        }

        .full-layout {
            grid-template-columns: 1fr;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .admin-card h2 {
            margin-bottom: 25px;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .image-preview {
            width: 100%;
            height: 150px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
        }

        .management-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .management-table th,
        .management-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .management-table th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            color: #3498db;
            cursor: pointer;
            background: none;
            border: none;
        }

        .btn-delete {
            color: #e74c3c;
            cursor: pointer;
            background: none;
            border: none;
        }

        @media (max-width: 900px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header id="navbar">
        <div class="nav-left">
            <h1>EduSphere</h1>
            <p>Admin Control Panel</p>
        </div>
        <div class="nav-right">
            <a class="opt" href="index.html">Home</a>
            <a class="opt" href="Course.html">Courses</a>
            <a class="opt active" href="admin_dashboard.html">Admin Dashboard</a>
            <a href="#" class="opt logout-link" onclick="handleLogout(event)" style="color: #ff4757;">Logout</a>
        </div>
    </header>

    <div class="admin-tabs">
        <button class="tab-btn active" onclick="showSection('courses')">Courses</button>
    </div>

    <div id="section-courses" class="admin-section">
        <div class="admin-layout">
            <div class="admin-card">
                <h2 id="form-title">Upload Course</h2>
                <form id="course-upload-form">
                    <input type="hidden" id="edit-mode" value="false">
                    <div class="form-group"><label>ID</label><input type="text" id="course-id" name="id" required></div>
                    <div class="form-group"><label>Title</label><input type="text" id="course-title" name="title"
                            required></div>
                    <div class="form-group"><label>Price</label><input type="text" id="course-price" name="price"
                            required></div>
                    <div class="form-group"><label>Duration</label><input type="text" id="course-duration"
                            name="duration" required></div>
                    <div class="form-group"><label>Description</label><textarea id="course-desc" name="description"
                            rows="3" required></textarea></div>
                    <div class="form-group">
                        <label>Image Source</label>
                        <select onchange="toggleImgInput(this.value)" name="imgSource">
                            <option value="file">File Upload</option>
                            <option value="url">External URL</option>
                        </select>
                    </div>
                    <div id="file-input-group" class="form-group"><input type="file" name="image"
                            onchange="previewImage(event)"></div>
                    <div id="url-input-group" class="form-group" style="display:none;"><input type="text"
                            name="imageUrl" oninput="previewUrl(this.value)"></div>
                    <div class="image-preview" id="image-preview"><img id="preview-img"></div>
                    <button type="submit" class="btn-action" style="margin-top:10px;">Save Course</button>
                </form>
            </div>
            <div class="admin-card">
                <h2>Manage Courses</h2>
                <table class="management-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>ID</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-course-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="section-enrollments" class="admin-section" style="display:none;">
        <div class="admin-layout full-layout">
            <div class="admin-card">
                <h2>All Enrollments</h2>
                <table class="management-table">
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Course</th>
                            <th>Date</th>
                        </tr>
                    </thead>
                    <tbody id="admin-enrollment-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="section-users" class="admin-section" style="display:none;">
        <div class="admin-layout full-layout">
            <div class="admin-card">
                <h2>All Registered Users</h2>
                <table class="management-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                        </tr>
                    </thead>
                    <tbody id="admin-user-list"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('userRole') !== 'admin') { window.location.href = "index.html"; return; }
            fetchAdminCourses();
            if (window.location.hash === '#enrollments') showSection('enrollments');
            if (window.location.hash === '#users') showSection('users');
        });

        // Sections Logic
        function showSection(name) {
            document.querySelectorAll('.admin-section').forEach(s => s.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('section-' + name).style.display = 'block';
            document.querySelector(`.tab-btn[onclick="showSection('${name}')"]`).classList.add('active');
            if (name === 'users') fetchUsers();
            if (name === 'enrollments') fetchEnrollments();
        }

        // Image Handling
        function toggleImgInput(v) {
            document.getElementById('file-input-group').style.display = v === 'file' ? 'block' : 'none';
            document.getElementById('url-input-group').style.display = v === 'url' ? 'block' : 'none';
        }

        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = () => {
                const img = document.getElementById('preview-img');
                img.src = reader.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        function previewUrl(url) {
            const img = document.getElementById('preview-img');
            img.src = url;
            img.style.display = url ? 'block' : 'none';
        }

        // Edit Logic
        async function fetchAdminCourses() {
            const res = await fetch(`${API_URL}/courses`);
            const courses = await res.json();
            document.getElementById('admin-course-list').innerHTML = courses.map(c => `
                <tr>
                    <td>${c.title}</td>
                    <td>${c.id}</td>
                    <td class="action-btns">
                        <button class="btn-edit" onclick="editCourse('${c.id}')"><i class="fa fa-pencil"></i></button>
                        <button class="btn-delete" onclick="deleteCourse('${c.id}')"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }
        async function editCourse(id) {
            const res = await fetch(`${API_URL}/courses`);
            const courses = await res.json();
            const course = courses.find(c => c.id === id);
            if (!course) return;

            document.getElementById('course-id').value = course.id;
            document.getElementById('course-title').value = course.title;
            document.getElementById('course-price').value = course.price;
            document.getElementById('course-duration').value = course.duration;
            document.getElementById('course-desc').value = course.desc;

            const img = document.getElementById('preview-img');
            img.src = course.image;
            img.style.display = 'block';

            document.getElementById('form-title').innerText = "Edit Course";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetAdminForm() {
            document.getElementById('course-upload-form').reset();
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('form-title').innerText = "Upload Course";
        }

        async function fetchUsers() {
            const res = await fetch(`${API_URL}/admin/all-users`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` } });
            const users = await res.json();
            document.getElementById('admin-user-list').innerHTML = users.map(u => `<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td></tr>`).join('');
        }

        async function fetchEnrollments() {
            const res = await fetch(`${API_URL}/admin/all-enrollments`, { headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` } });
            const enrolls = await res.json();
            document.getElementById('admin-enrollment-list').innerHTML = enrolls.map(e => `<tr><td>${e.userEmail}</td><td>${e.courseTitle || e.courseId}</td><td>${new Date(e.createdAt).toLocaleDateString()}</td></tr>`).join('');
        }

        document.getElementById('course-upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.innerText = "Processing...";
            submitBtn.disabled = true;

            const res = await fetch(`${API_URL}/admin/upload-course`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` },
                body: new FormData(e.target)
            });
            const data = await res.json();
            if (res.ok) {
                alert("Course saved successfully!");
                fetchAdminCourses();
                resetAdminForm();
            } else {
                alert("Error: " + (data.error || data.message || "Save failed"));
            }
            submitBtn.innerText = "Save Course";
            submitBtn.disabled = false;
        });

        async function deleteCourse(id) {
            if (!confirm("Delete?")) return;
            const res = await fetch(`${API_URL}/admin/delete-course/${id}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${localStorage.getItem('authToken')}` } });
            if (res.ok) fetchAdminCourses(); else alert("Failed");
        }
    </script>
</body>

</html>

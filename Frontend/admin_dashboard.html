<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | EduSphere</title>
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css_files/style.css">
    <style>
        .admin-layout {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            max-width: 1400px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .admin-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .admin-card h2 {
            margin-bottom: 25px;
            color: var(--primary);
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .btn-action {
            width: 100%;
            padding: 12px;
            background: var(--primary-gradient);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 87, 34, 0.4);
        }

        .image-preview {
            width: 100%;
            height: 150px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            overflow: hidden;
        }

        .image-preview img {
            max-width: 100%;
            max-height: 100%;
            display: none;
        }

        /* Course Table Styles */
        .management-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .management-table th,
        .management-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .management-table th {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
            font-weight: 600;
        }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-edit {
            color: #3498db;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
        }

        .btn-delete {
            color: #e74c3c;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 1rem;
        }

        @media (max-width: 900px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <header id="navbar">
        <div class="nav-left">
            <h1>EduSphere</h1>
            <p>Admin Control Panel</p>
        </div>
        <div class="nav-right">
            <a class="opt" href="index.html">Home</a>
            <a class="opt" href="Course.html">Courses</a>
            <a class="opt active" href="admin_dashboard.html">Admin Dashboard</a>
            <a href="#" class="opt logout-link" onclick="handleLogout(event)" style="color: #ff4757;">Logout</a>
        </div>
    </header>

    <div class="admin-layout">
        <!-- Form Side -->
        <div class="admin-card">
            <h2 id="form-title">Upload New Course</h2>
            <form id="course-upload-form" enctype="multipart/form-data">
                <input type="hidden" id="edit-mode" value="false">
                <div class="form-group">
                    <label>Course ID (e.g., machine-learning)</label>
                    <input type="text" id="course-id" name="id" placeholder="Enter unique ID" required>
                </div>
                <div class="form-group">
                    <label>Course Title</label>
                    <input type="text" id="course-title" name="title" placeholder="Enter course title" required>
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="course-price" name="price" placeholder="e.g. ₹4,999" required>
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" id="course-duration" name="duration" placeholder="e.g. 3 Months" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="course-desc" name="description" rows="3" placeholder="Enter course description" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Image Source</label>
                    <div class="radio-group">
                        <label><input type="radio" name="imgSource" value="file" checked onclick="toggleImgInput('file')"> Upload File</label>
                        <label><input type="radio" name="imgSource" value="url" onclick="toggleImgInput('url')"> Paste URL</label>
                    </div>
                </div>

                <div id="file-input-group" class="form-group">
                    <input type="file" id="course-image" name="image" accept="image/*" onchange="previewImage(event)">
                </div>
                <div id="url-input-group" class="form-group" style="display: none;">
                    <input type="text" id="course-image-url" name="imageUrl" placeholder="Paste image link here" oninput="previewUrl(this.value)">
                </div>

                <div class="image-preview" id="image-preview">
                    <span id="preview-text">No image selected</span>
                    <img src="" alt="Preview" id="preview-img">
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button type="submit" class="btn-action" id="submit-btn">Save Course</button>
                    <button type="button" class="btn-action" id="cancel-btn" style="background: #555; display: none;" onclick="resetAdminForm()">Cancel</button>
                </div>
            </form>
        </div>

        <!-- Management Side -->
        <div class="admin-card">
            <h2>Manage Courses</h2>
            <div style="overflow-x: auto;">
                <table class="management-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>ID</th>
                            <th>Price</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="admin-course-list">
                        <!-- Loaded via JS -->
                        <tr><td colspan="4" style="text-align: center;">Loading courses...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Check admin role
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('userRole');
            if (role !== 'admin') {
                alert("Unauthorized! Admins only.");
                window.location.href = "index.html";
                return;
            }
            fetchAdminCourses();
        });

        function toggleImgInput(type) {
            document.getElementById('file-input-group').style.display = (type === 'file' ? 'block' : 'none');
            document.getElementById('url-input-group').style.display = (type === 'url' ? 'block' : 'none');
        }

        function previewImage(event) {
            const input = event.target;
            const previewImg = document.getElementById('preview-img');
            const previewText = document.getElementById('preview-text');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    previewImg.style.display = 'block';
                    previewText.style.display = 'none';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function previewUrl(url) {
            const previewImg = document.getElementById('preview-img');
            const previewText = document.getElementById('preview-text');
            if (url.trim()) {
                previewImg.src = url;
                previewImg.style.display = 'block';
                previewText.style.display = 'none';
            }
        }

        async function fetchAdminCourses() {
            const tbody = document.getElementById('admin-course-list');
            try {
                const response = await fetch(`${API_URL}/courses`);
                const courses = await response.json();
                
                if (courses.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">No courses found.</td></tr>';
                    return;
                }

                tbody.innerHTML = courses.map(course => `
                    <tr>
                        <td>${course.title}</td>
                        <td><code>${course.id}</code></td>
                        <td>${course.price}</td>
                        <td class="action-btns">
                            <button class="btn-edit" onclick='editCourse(${JSON.stringify(course)})'><i class="fa fa-edit"></i></button>
                            <button class="btn-delete" onclick="deleteCourse('${course.id}')"><i class="fa fa-trash"></i></button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="4" style="color:red; text-align: center;">Error loading courses</td></tr>';
            }
        }

        function editCourse(course) {
            document.getElementById('form-title').innerText = "Edit Course";
            document.getElementById('course-id').value = course.id;
            document.getElementById('course-id').readOnly = true;
            document.getElementById('course-title').value = course.title;
            document.getElementById('course-price').value = course.price;
            document.getElementById('course-duration').value = course.duration;
            document.getElementById('course-desc').value = course.desc;
            
            // Show preview
            document.getElementById('preview-img').src = course.image;
            document.getElementById('preview-img').style.display = 'block';
            document.getElementById('preview-text').style.display = 'none';
            
            // Force URL mode for edit initially if it looks like a URL, or just let user choose
            if (course.image.startsWith('http')) {
                document.querySelector('input[value="url"]').checked = true;
                toggleImgInput('url');
                document.getElementById('course-image-url').value = course.image;
            }

            document.getElementById('edit-mode').value = "true";
            document.getElementById('cancel-btn').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetAdminForm() {
            const form = document.getElementById('course-upload-form');
            form.reset();
            document.getElementById('form-title').innerText = "Upload New Course";
            document.getElementById('course-id').readOnly = false;
            document.getElementById('edit-mode').value = "false";
            document.getElementById('cancel-btn').style.display = 'none';
            document.getElementById('preview-img').style.display = 'none';
            document.getElementById('preview-text').style.display = 'block';
            toggleImgInput('file');
        }

        document.getElementById('course-upload-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const token = localStorage.getItem('authToken');
            const submitBtn = document.getElementById('submit-btn');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Processing...";

            try {
                const response = await fetch(`${API_URL}/admin/upload-course`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    resetAdminForm();
                    fetchAdminCourses();
                } else {
                    alert(data.error || "Save failed");
                }
            } catch (err) {
                alert("Server error");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Save Course";
            }
        });

        async function deleteCourse(id) {
            if (!confirm(`Are you sure you want to delete course ${id}?`)) return;
            
            const token = localStorage.getItem('authToken');
            try {
                const response = await fetch(`${API_URL}/admin/delete-course/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (response.ok) {
                    alert(data.message);
                    fetchAdminCourses();
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Deletion failed");
            }
        }
    </script>
</body>

</html>

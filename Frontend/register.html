<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EduSphere</title>
    <link rel="icon" type="image/png" href="images/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css_files/style.css">
</head>

<body>

    <div class="register-box">
        <h2>Register</h2>

        <!-- UPDATED FORM TAG: Triggers JS instead of direct link -->
        <form onsubmit="handleRegister(event)">

            <label>Full Name</label>
            <!-- Added ID for Script -->
            <input type="text" id="reg-name" placeholder="Enter your full name" required>

            <label>Email</label>
            <!-- Added ID for Script -->
            <input type="email" id="reg-email" placeholder="Enter your email" required>

            <label>Password</label>
            <div class="password-container">
                <input type="password" id="reg-pass" placeholder="Create a password" required>
                <i class="fa fa-eye" id="toggleRegPass"
                    onclick="togglePasswordVisibility('reg-pass', 'toggleRegPass')"></i>
            </div>

            <label>Confirm Password</label>
            <div class="password-container">
                <input type="password" id="reg-confirm" placeholder="Confirm your password" required>
                <i class="fa fa-eye" id="toggleConfirmPass"
                    onclick="togglePasswordVisibility('reg-confirm', 'toggleConfirmPass')"></i>
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="login-link">
            <p>Already have an account? <a href="login.html">Login Here</a></p>
            <a href="index.html" class="back-home">&larr; Back To Home</a>
        </div>

    </div>

    <!-- LINK TO JAVASCRIPT LOGIC -->
    <script src="script.js"></script>


</body>

</html>

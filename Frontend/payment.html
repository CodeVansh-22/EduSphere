<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout | EduSphere</title>
    <link rel="icon" type="image/png" href="images/icon.ico">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <link rel="stylesheet" href="css_files/style.css">
</head>

<body>

    <div class="payment-wrapper">
        <div class="payment-container">

            <div class="summary-sidebar">
                <div class="sidebar-top">
                    <div class="app-brand-small">EduSphere</div>
                    <div class="checkout-title">Order Summary</div>

                    <div class="price-box">
                        <div class="course-name" id="disp-title">Select a Course</div>
                        <div class="price-label">Total Payable</div>
                        <div class="price-amount" id="disp-price">₹0</div>
                    </div>
                </div>

                <div class="sidebar-bottom user-info">
                    <p class="user-name"><i class="fa fa-user-circle"></i> <span id="disp-user">Guest User</span></p>
                    <p class="ssl-secure"><i class="fa fa-lock"></i> 256-bit SSL Secure</p>
                </div>
            </div>

            <div class="payment-content">

                <div class="checkout-header">
                    <h2>Checkout</h2>
                    <p>Complete your purchase securely via Razorpay.</p>
                </div>

                <div class="secure-badge">
                    <div class="badge-text">Accepted Methods</div>
                    <div class="icons-row">
                        <i class="fa fa-credit-card" title="Cards"></i>
                        <i class="fa fa-google-wallet" title="UPI / GPay"></i>
                        <i class="fa fa-university" title="NetBanking"></i>
                        <i class="fa fa-qrcode" title="QR Scan"></i>
                    </div>
                </div>

                <button class="pay-btn" id="pay-btn-main" onclick="initiatePayment()">
                    Pay Now
                </button>

                <div class="cancel-link">
                    <a href="Course.html"><i class="fa fa-arrow-left"></i> Cancel and Go Back</a>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>

    <script>
        // 1. LOAD DATA ON PAGE LOAD
        window.onload = function () {
            const id = localStorage.getItem("selectedCourse");
            const user = localStorage.getItem("currentUserName") || "Guest User";

            document.getElementById("disp-user").innerText = user;

            const token = localStorage.getItem('authToken');

            if (!id || !token || typeof courseData === 'undefined' || !courseData[id]) {
                if (typeof courseData === 'undefined') {
                    console.log("Waiting for script.js...");
                } else if (!token) {
                    alert("Session expired. Please login again.");
                    window.location.href = "login.html";
                } else {
                    alert("Please select a course first.");
                    window.location.href = "Course.html";
                }
                return;
            }

            const c = courseData[id];
            document.getElementById("disp-price").innerText = "" + c.price;
            document.getElementById("disp-title").innerText = c.title;
            document.getElementById("pay-btn-main").innerText = "Pay " + c.price;
        };


        // 2. PAYMENT LOGIC (Direct to Razorpay)
        async function initiatePayment() {

            const btn = document.getElementById("pay-btn-main");
            const originalText = btn.innerText;
            const priceText = document.getElementById("disp-price").innerText;
            const amount = parseInt(priceText.replace(/[^0-9]/g, ''));

            // UI Feedback
            btn.innerText = "Connecting to Secure Server...";
            btn.style.opacity = "0.7";
            btn.disabled = true;

            try {
                // Step 0: Ensure backend is awake (Render Free Tier)
                const wakeCheck = await fetch(`${API_URL}/courses`, { method: 'GET' }).catch(() => null);
                if (!wakeCheck) console.warn("Backend might be waking up...");

                const token = localStorage.getItem('authToken');
                // Step 1: Create Order on Backend
                let res = await fetch(`${API_URL}/create-order`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ amount: amount })
                });

                let data = await res.json();

                if (!res.ok) {
                    const errorText = await res.text();
                    console.error("Order creation failed status:", res.status, "Error:", errorText);
                    if (res.status === 401) {
                        alert("Session expired or invalid. Please login again.");
                        window.location.href = "login.html";
                    } else {
                        throw new Error(`Order creation failed (Status ${res.status}): ${errorText}`);
                    }
                    return;
                }

                // Step 2: Open Razorpay Options
                const options = {
                    key: "rzp_test_RnqzlJgS6MFe2M",
                    amount: data.amount,
                    currency: "INR",
                    order_id: data.id,
                    name: "EduSphere",
                    description: document.getElementById("disp-title").innerText,
                    image: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
                    theme: { color: "#38bdf8" },

                    handler: async function (response) {
                        // Success Handler
                        console.log("Payment Successful! Ref: " + response.razorpay_payment_id);

                        const selectedCourse = localStorage.getItem("selectedCourse");
                        const userEmail = localStorage.getItem("currentUserEmail");
                        const courseTitle = document.getElementById("disp-title").innerText;
                        const priceText = document.getElementById("disp-price").innerText;
                        const amount = parseInt(priceText.replace(/[^0-9]/g, ''));

                        try {
                            // 1. Record Detailed Payment
                            await fetch(`${API_URL}/save-payment`, {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "Authorization": `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    paymentId: response.razorpay_payment_id,
                                    orderId: response.razorpay_order_id,
                                    signature: response.razorpay_signature,
                                    userEmail,
                                    amount,
                                    courseId: selectedCourse,
                                    courseTitle
                                })
                            });

                            // 2. Enroll User
                            const enrollRes = await fetch(`${API_URL}/enroll`, {
                                method: "POST",
                                headers: {
                                    "Content-Type": "application/json",
                                    "Authorization": `Bearer ${token}`
                                },
                                body: JSON.stringify({
                                    userEmail,
                                    courseId: selectedCourse,
                                    courseTitle
                                })
                            });

                            if (enrollRes.ok) {
                                alert("Success! Enrolled in course.");
                                window.location.href = "dashboard.html";
                            } else {
                                alert("Payment successful, but enrollment failed. Please contact support.");
                                window.location.href = "Course.html";
                            }
                        } catch (err) {
                            console.error("Enrollment error:", err);
                        }
                    },
                    modal: {
                        ondismiss: function () {
                            // If user closes modal without paying
                            btn.innerText = originalText;
                            btn.style.opacity = "1";
                            btn.disabled = false;
                        }
                    }
                };

                const rp = new Razorpay(options);

                rp.on('payment.failed', function (response) {
                    alert("Payment Failed: " + response.error.description);
                    btn.innerText = originalText;
                    btn.style.opacity = "1";
                    btn.disabled = false;
                });

                rp.open();

            } catch (err) {
                console.error("Payment Initiation Error:", err);
                alert("Payment initiation failed: " + err.message + "\n\nPlease check the browser console (F12) for details.");
                btn.innerText = originalText;
                btn.style.opacity = "1";
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>

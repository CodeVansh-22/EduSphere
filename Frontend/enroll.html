<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enroll Form</title>
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link rel="stylesheet" href="css_files/style.css">
</head>

<body>

    <header id="navbar">
        <div class="nav-left">
            <h1>EduSphere</h1>
            <p>Learn New Skills Anywhere</p>
        </div>
        <nav class="nav-right">
            <a class="opt" href="index.html">Home</a>
            <a class="opt" href="Course.html">Courses</a>
            <a class="opt" href="login.html">Login</a>
            <a class="opt" href="register.html">Register</a>
        </nav>
    </header>

    <div class="enroll-card">
        <h2>Enroll Now</h2>
        <p class="subtitle">Join our courses and start learning today!</p>

        <form id="enrollForm">
            <div class="form-group">
                <label for="name">Full Name <span class="required">*</span></label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="degree">Std/Degree <span class="required">*</span></label>
                <select id="degree" name="degree" required>
                    <option value="">-- Select your degree --</option>
                    <option value="10th">10th Standard</option>
                    <option value="12th">12th Standard</option>
                    <option value="bachelor">Bachelor's Degree</option>
                    <option value="master">Master's Degree</option>
                    <option value="diploma">Diploma</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="contact">Contact No. <span class="required">*</span></label>
                <input type="tel" id="contact" name="contact" pattern="[0-9]{10}" placeholder="Enter your phone number"
                    required>
            </div>

            <button type="submit" class="submit-btn">Submit Now</button>
            <p class="info-message">✓ We'll contact you within 24 hours</p>
        </form>

        <div id="successMessage" class="hidden">
            <div class="loader"></div>
            <p class="success-text">✓ Your enrollment is Completed!</p>
            <p style="color:var(--text-muted); margin-top:10px;">We will contact you shortly.</p>
            <br>
            <a href="index.html" class="hero-btn" style="font-size:0.9rem;">Return Home</a>
        </div>
    </div>

    <footer id="footer">
        <p>&copy; 2025 EduSphere</p>
    </footer>

    <nav class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <i class="fa fa-home"></i>
            <span>Home</span>
        </a>
        <a href="Course.html" class="bottom-nav-item active">
            <i class="fa fa-book"></i>
            <span>Courses</span>
        </a>
        <a href="About.html" class="bottom-nav-item">
            <i class="fa fa-info-circle"></i>
            <span>About</span>
        </a>
        <a href="Contact.html" class="bottom-nav-item">
            <i class="fa fa-envelope"></i>
            <span>Contact</span>
        </a>
    </nav>

    <script>
        const form = document.getElementById('enrollForm');
        const successMessage = document.getElementById('successMessage');

        form.addEventListener('submit', function (e) {
            e.preventDefault();
            form.style.display = 'none'; // Hide form
            successMessage.classList.remove('hidden'); // Show success
        });
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduSphere</title>
    <link rel="icon" type="image/x-icon" href="images/icon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css_files/style.css">
</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <!-- UPDATED FORM: Triggers JS Logic -->
        <form onsubmit="handleLogin(event)">

            <label>Email</label>
            <!-- Added ID for Script -->
            <input type="email" id="login-email" placeholder="Enter your email" required>

            <label>Password</label>
            <div class="password-container">
                <input type="password" id="login-pass" placeholder="Enter your password" required>
                <i class="fa fa-eye" id="toggleLoginPass"
                    onclick="togglePasswordVisibility('login-pass', 'toggleLoginPass')"></i>
            </div>

            <button type="submit">Login</button>
        </form>

        <div class="register-link">
            <p>New User? <a href="register.html">Register Here</a></p>
            <a href="index.html" class="back-home">&larr; Back To Home</a>
        </div>
    </div>

    <!-- LINK TO SCRIPT -->
    <script src="script.js"></script>

</body>

</html>
